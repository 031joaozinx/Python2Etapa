{% if locacoes %}
<table>
    <thead>
        <tr>
            <th>Cliente</th>
            <th>Veículo</th>
            <th>Início</th>
            <th>Fim</th>
            <th>Total</th>
        </tr>
    </thead>
    <tbody>
        {% for locacao in locacoes %}
        <tr>
            <td>{{ locacao.cliente.nome }}</td>
            <td>{{ locacao.veiculo.placa }}</td>
            <td>{{ locacao.data_inicio }}</td>
            <td>{{ locacao.data_fim }}</td>
            <td>R$ {{ locacao.valor_total }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% else %}
<p>Nenhuma locação cadastrada.</p>
{% endif %}
